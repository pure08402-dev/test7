<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飲食追蹤 PRO MAX</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#111;color:#fff;margin:0;padding:10px}
input,button,select{margin:5px 0;padding:10px;border-radius:8px;border:none;width:100%;box-sizing:border-box}
button{cursor:pointer;background:#4caf50;color:#fff}
.card{background:#222;padding:12px;margin:10px 0;border-radius:12px}
.ok{color:#4caf50}
.bad{color:#f44336}
h2{text-align:center}
.row{display:flex;gap:10px}
.row input{flex:1}
canvas{background:#fff;border-radius:10px;margin-top:10px}

@media (min-width:768px){
body{max-width:600px;margin:auto}
input,button,select{width:auto}
.row input{width:100%}
}
</style>
</head>

<body>

<h2>飲食追蹤 PRO MAX</h2>

<div class="card">
<h3>日期</h3>
<input type="date" id="datePicker" onchange="switchDate()">
</div>

<div class="card">
<h3>今日分析</h3>
<div id="summary"></div>
</div>

<div class="card">
<h3>基礎代謝工具</h3>
<button onclick="openBMR()">計算基礎代謝（BMR）</button>
</div>

<div class="card">
<h3>目標設定</h3>
<div class="row">
<input type="number" id="targetCal" placeholder="熱量">
<input type="number" id="targetPro" placeholder="蛋白">
</div>
<input type="number" id="targetWater" placeholder="喝水 ml">
<button onclick="setTarget()">儲存</button>
</div>

<div class="card">
<h3>新增飲食</h3>

<select id="foodSelect" onchange="quickFill()">
<option value="">快速選擇</option>
<option data-cal="300" data-pro="20">雞胸肉</option>
<option data-cal="250" data-pro="8">白飯</option>
<option data-cal="150" data-pro="10">蛋</option>
<option data-cal="120" data-pro="5">豆腐</option>
<option data-cal="148" data-pro="26">乳清</option>
<option data-cal="80" data-pro="0">紅茶</option>
</select>

<input type="text" id="name" placeholder="食物名稱">

<select id="meal">
<option>早餐</option>
<option>午餐</option>
<option>晚餐</option>
<option>加餐</option>
</select>

<div class="row">
<input type="number" id="cal" placeholder="熱量">
<input type="number" id="pro" placeholder="蛋白">
</div>

<button onclick="addFood()">新增</button>
</div>

<div class="card">
<h3>紀錄</h3>
<div id="list"></div>
</div>

<div class="card">
<h3>體重</h3>
<input type="number" id="weight">
<button onclick="saveWeight()">儲存</button>
<canvas id="weightChart"></canvas>
</div>

<div class="card">
<h3>喝水</h3>
<input type="number" id="water">
<button onclick="saveWater()">儲存</button>
</div>

<div class="card">
<button onclick="exportCSV()">匯出 CSV</button>
</div>

<script>
let data = JSON.parse(localStorage.getItem('dietData')) || {};
let today = new Date().toISOString().split('T')[0];
let currentDate = today;

datePicker.value = today;

function ensureDay(d){
    if(!data[d]) data[d]={foods:[],weight:null,water:null};
}
ensureDay(today);

function switchDate(){
    currentDate = datePicker.value;
    ensureDay(currentDate);
    update();
}

function openBMR(){
    window.open('https://tools.heho.com.tw/bmr/','_blank');
}

function setTarget(){
    localStorage.setItem('targetCal',targetCal.value);
    localStorage.setItem('targetPro',targetPro.value);
    localStorage.setItem('targetWater',targetWater.value);
	
	update();
}

function quickFill(){
    let select = document.getElementById("foodSelect");
    let selected = select.options[select.selectedIndex];

	// 自動填入名稱
    document.getElementById("name").value = selected.text;
	
	 // 自動填入熱量 & 蛋白
	document.getElementById("cal").value = selected.dataset.cal || '';
    document.getElementById("pro").value = selected.dataset.pro || '';
}

function addFood(){
    let nameEl = document.getElementById("name");
    let mealEl = document.getElementById("meal");
    let calEl = document.getElementById("cal");
    let proEl = document.getElementById("pro");

    data[currentDate].foods.push({
        name: nameEl.value,
        meal: mealEl.value,
        cal: Number(calEl.value),
        pro: Number(proEl.value)
    });

    save();

    nameEl.value = '';
    calEl.value = '';
    proEl.value = '';
}

function saveWeight(){
    data[currentDate].weight = Number(weight.value);
    save();
}

function saveWater(){
    data[currentDate].water = Number(water.value);
    save();
}

function save(){
    localStorage.setItem('dietData',JSON.stringify(data));
    update();
}

function getTotal(d){
    let cal=0,pro=0;
    d.foods.forEach(f=>{
        cal+=f.cal;
        pro+=f.pro;
    });
    return {cal,pro};
}

function init(){
    let d = data[currentDate];

    // 體重回填
    weight.value = d.weight || '';

    // 喝水回填
    water.value = d.water || '';

    // 目標回填
    targetCal.value = localStorage.getItem('targetCal') || '';
    targetPro.value = localStorage.getItem('targetPro') || '';
    targetWater.value = localStorage.getItem('targetWater') || '';
}

function update(){
    let t=getTotal(data[currentDate]);

    let tCal=Number(localStorage.getItem('targetCal'))||0;
    let tPro=Number(localStorage.getItem('targetPro'))||0;
    let tWater=Number(localStorage.getItem('targetWater'))||0;

    let remainCal=tCal-t.cal;
    let remainPro=tPro-t.pro;

    let mode = "維持";
    if(remainCal>300) mode="減脂🔥";
    if(remainCal<-300) mode="增脂⚠️";

    summary.innerHTML=`
    熱量: ${t.cal}/${tCal} (${remainCal})
    <br>蛋白: ${t.pro}/${tPro}
    <br>水: ${data[currentDate].water||0}/${tWater}
    <br>模式: ${mode}
    `;

    let html='';
    data[currentDate].foods.forEach((f,i)=>{
        html+=`${f.name} | ${f.meal} | ${f.cal}kcal | ${f.pro}g 
        <button onclick="del(${i})">X</button><br>`;
    });
    list.innerHTML=html;

    drawChart();
	
	targetCal.value = localStorage.getItem('targetCal') || '';
    targetPro.value = localStorage.getItem('targetPro') || '';
    targetWater.value = localStorage.getItem('targetWater') || '';
	
	
	init();
}

function del(i){
    data[currentDate].foods.splice(i,1);
    save();
}

function drawChart(){
    let labels=[];
    let weights=[];

    for(let d in data){
        if(data[d].weight){
            labels.push(d);
            weights.push(data[d].weight);
        }
    }

    if(window.chart) window.chart.destroy();

    window.chart = new Chart(weightChart,{
        type:'line',
        data:{
            labels:labels,
            datasets:[{label:'體重',data:weights}]
        }
    });
}

function exportCSV(){
    let csv='日期,熱量,蛋白,體重,喝水\n';
    for(let d in data){
        let t=getTotal(data[d]);
        csv+=`${d},${t.cal},${t.pro},${data[d].weight||''},${data[d].water||''}\n`;
    }
    let blob=new Blob([csv]);
    let a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='diet.csv';
    a.click();
}

setInterval(()=>{
    let now=new Date().toISOString().split('T')[0];
    if(now!==currentDate){
        currentDate=now;
        datePicker.value=now;
        ensureDay(now);
        update();
    }
},60000);

init();
update();
</script>

</body>
</html>
