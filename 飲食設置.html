<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>飲食追蹤</title>

<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<style>
body{font-family:Arial;background:#111;color:#fff;margin:0;padding:10px}
input,button,select{margin:5px 0;padding:10px;border-radius:8px;border:none;width:100%;box-sizing:border-box}
button{cursor:pointer;background:#4caf50;color:#fff}
.card{background:#222;padding:12px;margin:10px 0;border-radius:12px}
.ok{color:#4caf50}
.bad{color:#f44336}
h2{text-align:center}
.row{display:flex;gap:10px}
.row input{flex:1}
canvas{background:#fff;border-radius:10px;margin-top:10px}

@media (min-width:768px){
body{max-width:600px;margin:auto}
input,button,select{width:auto}
.row input{width:100%}
}
</style>
</head>

<body>

<h2>飲食追蹤</h2>

<div class="card">
<h3>日期</h3>
<input type="date" id="datePicker" onchange="switchDate()">
<button onclick="deleteDay()">刪除當天紀錄</button>
</div>

<div class="card">
<h3>今日分析</h3>
<div id="summary"></div>
</div>

<div class="card">
<h3>基礎代謝工具</h3>

<div class="input-unit">
<span>體重</span>
<input type="number" id="bmr_weight" placeholder="kg">
</div>
<div class="input-unit">
<span>身高</span>
<input type="number" id="bmr_height" placeholder="cm">

</div>
<div class="input-unit">
<span>年齡</span>
<input type="number" id="bmr_age" placeholder="歲">

</div>

<select id="bmr_gender">
<option value="male">男生</option>
<option value="female">女生</option>
</select>

<select id="bmr_activity">
<option value="1.2">久坐（幾乎不運動）</option>
<option value="1.375">輕量運動（1-3天）</option>
<option value="1.55">中度運動（3-5天）</option>
<option value="1.725">高度運動（6-7天）</option>
</select>

<button onclick="calcBMR()">計算 BMR / TDEE</button>
<button onclick="openBMR()">參考網站</button>
<div id="bmr_result"></div>
</div>


<div class="card">
<h3>目標設定</h3>
<div class="row">
<div class="input-unit">
<span>熱量</span>
<input type="number" id="targetCal" placeholder="kcal">
</div>
<div class="input-unit">
<span>蛋白</span>
<input type="number" id="targetPro" placeholder="g">
</div>
</div>
<div class="input-unit">
<span>喝水</span>
<input type="number" id="targetWater" placeholder="ml">
</div>
<button onclick="setTarget()">儲存</button>
</div>

<div class="card">
<h3>新增飲食</h3>

<select id="foodSelect" onchange="quickFill()">
<option value="">快速選擇</option>
<option data-cal="300" data-pro="20">雞胸肉</option>
<option data-cal="250" data-pro="8">白飯</option>
<option data-cal="200" data-pro="9">初乳300ml</option>
<option data-cal="150" data-pro="10">蛋</option>
<option data-cal="120" data-pro="5">豆腐</option>
<option data-cal="148" data-pro="26">乳清</option>
<option data-cal="160" data-pro="0">紅茶550ml</option>
</select>

<input type="text" id="name" placeholder="食物名稱">

<select id="meal">
<option>早餐</option>
<option>午餐</option>
<option>晚餐</option>
<option>加餐</option>
</select>

<div class="row">
<input type="number" id="cal" placeholder="熱量">
<input type="number" id="pro" placeholder="蛋白">
</div>

<button onclick="addFood()">新增</button>
</div>

<div class="card">
<h3>紀錄</h3>
<div id="list"></div>
</div>

<div class="card">
<h3>體重</h3>
<input type="number" id="weight">
<button onclick="saveWeight()">儲存</button>
<canvas id="weightChart"></canvas>
</div>

<div class="card">
<h3>喝水</h3>
<input type="number" id="water">
<button onclick="saveWater()">儲存</button>
</div>

<div class="card">
<button onclick="exportLINE()">複製結果</button>
<button onclick="exportCSV()">匯出 CSV</button>
</div>


<script>
let data = JSON.parse(localStorage.getItem('dietData')) || {};
let today = new Date().toISOString().split('T')[0];
let currentDate = today;

datePicker.value = today;

function ensureDay(d){
    if(!data[d]) data[d]={foods:[],weight:null,water:null};
}

ensureDay(today);

// =====================
// 日期切換
// =====================
function switchDate(){
    currentDate = datePicker.value;
    ensureDay(currentDate);
    update();
}

// =====================
// 刪除當天
// =====================
function deleteDay(){
    if(currentDate === today){
        alert("今天不能刪除");
        return;
    }

    if(!confirm("確定刪除這一天？")) return;

    delete data[currentDate];
    localStorage.setItem('dietData', JSON.stringify(data));

    ensureDay(currentDate);
    update();

    alert("已刪除");
}

// =====================
// BMR
// =====================
function openBMR(){
    window.open('https://tools.heho.com.tw/bmr/','_blank');
}


function calcBMR(){

    let w = Number(document.getElementById("bmr_weight").value);
    let h = Number(document.getElementById("bmr_height").value);
    let a = Number(document.getElementById("bmr_age").value);
    let gender = document.getElementById("bmr_gender").value;
    let act = Number(document.getElementById("bmr_activity").value);

    if(!w || !h || !a){
        alert("請填完整資料");
        return;
    }

    let bmr = 0;

    // Mifflin-St Jeor
    if(gender === "male"){
        bmr = 10*w + 6.25*h - 5*a + 5;
    }else{
        bmr = 10*w + 6.25*h - 5*a - 161;
    }

    let tdee = bmr * act;

    let cut = tdee * 0.8;
    let bulk = tdee * 1.1;

    document.getElementById("bmr_result").innerHTML = `
        🔥 BMR：${bmr.toFixed(0)} kcal<br>
        ⚡ TDEE：${tdee.toFixed(0)} kcal<br><br>

        📉 減脂：${cut.toFixed(0)} kcal<br>
        ⚖️ 維持：${tdee.toFixed(0)} kcal<br>
        📈 增肌：${bulk.toFixed(0)} kcal<br>
    `;
}


// =====================
// 目標
// =====================
function setTarget(){
    localStorage.setItem('targetCal',targetCal.value);
    localStorage.setItem('targetPro',targetPro.value);
    localStorage.setItem('targetWater',targetWater.value);
    update();
}

// =====================
// 快速填入
// =====================
function quickFill(){
    let select = document.getElementById("foodSelect");
    let selected = select.options[select.selectedIndex];

    document.getElementById("name").value = selected.text;
    document.getElementById("cal").value = selected.dataset.cal || '';
    document.getElementById("pro").value = selected.dataset.pro || '';
}

// =====================
// 新增飲食（防錯版）
// =====================
function addFood(){

    if(!isToday()){
        alert("只能新增今天的紀錄");
        return;
    }
	
    let nameEl = document.getElementById("name");
    let mealEl = document.getElementById("meal");
    let calEl = document.getElementById("cal");
    let proEl = document.getElementById("pro");

    if(!nameEl.value) return;

    data[currentDate].foods.push({
        name: nameEl.value,
        meal: mealEl.value,
        cal: Number(calEl.value) || 0,
        pro: Number(proEl.value) || 0
    });

    save();

    nameEl.value = '';
    calEl.value = '';
    proEl.value = '';
}

// =====================
// 體重
// =====================

function isToday(){
    return currentDate === today;
}

function saveWeight(){

    if(!isToday()){
        alert("只能修改今天體重");
        return;
    }

    if(!weight.value) return;

    data[currentDate].weight = Number(weight.value);
    save();
}

// =====================
// 喝水
// =====================
function saveWater(){

    if(!isToday()){
        alert("只能修改今天喝水");
        return;
    }

    if(!water.value) return;

    data[currentDate].water = Number(water.value);
    save();
}

// =====================
// 存檔
// =====================
function save(){
    localStorage.setItem('dietData',JSON.stringify(data));
    update();
}

// =====================
// 計算總和
// =====================
function getTotal(d){
    let cal=0,pro=0;
    d.foods.forEach(f=>{
        cal += f.cal;
        pro += f.pro;
    });
    return {cal,pro};
}

// =====================
// 初始化 UI
// =====================
function init(){
    let d = data[currentDate];

    weight.value = d?.weight || '';
    water.value = d?.water || '';

    targetCal.value = localStorage.getItem('targetCal') || '';
    targetPro.value = localStorage.getItem('targetPro') || '';
    targetWater.value = localStorage.getItem('targetWater') || '';
}

// =====================
// 更新畫面
// =====================
function update(){
    ensureDay(currentDate);

    let t = getTotal(data[currentDate]);

    let tCal=Number(localStorage.getItem('targetCal'))||0;
    let tPro=Number(localStorage.getItem('targetPro'))||0;
    let tWater=Number(localStorage.getItem('targetWater'))||0;

    let remainCal=tCal-t.cal;
    let remainPro=tPro-t.pro;

    let mode = "維持";
    if(remainCal>300) mode="減脂🔥";
    if(remainCal<-300) mode="增脂⚠️";

    summary.innerHTML=`
    熱量: ${t.cal}/${tCal} (${remainCal})
    <br>蛋白: ${t.pro}/${tPro}
    <br>水: ${data[currentDate].water||0}/${tWater}
    <br>模式: ${mode}
    `;

    let html='';
    data[currentDate].foods.forEach((f,i)=>{
        html+=`${f.name} | ${f.meal} | ${f.cal}kcal | ${f.pro}g 
        <button onclick="del(${i})">X</button><br>`;
    });

    list.innerHTML=html;

    drawChart();

    init();
}

// =====================
// 刪除食物
// =====================
function del(i){
    data[currentDate].foods.splice(i,1);
    save();
}

// =====================
// 圖表
// =====================
function drawChart(){
    let labels=[];
    let weights=[];

    for(let d in data){
        if(data[d].weight !== null){
            labels.push(d);
            weights.push(data[d].weight);
        }
    }

    if(window.chart) window.chart.destroy();

    window.chart = new Chart(weightChart,{
        type:'line',
        data:{
            labels:labels,
            datasets:[{label:'體重',data:weights}]
        }
    });
}

// =====================
// LINE
// =====================
function exportLINE(){
    let d = data[currentDate];
    let t = getTotal(d);

    let text =
`📅 ${currentDate}
────────────
🔥 熱量：${t.cal}
💪 蛋白：${t.pro}
💧 喝水：${d.water || 0} ml

🍽 飲食紀錄：
`;

    d.foods.forEach(f=>{
        text += `• ${f.name} (${f.meal}) ${f.cal} kcal / ${f.pro}g\n`;
    });

    navigator.clipboard.writeText(text);
    alert("已複製");
}

// =====================
// CSV
// =====================
function exportCSV(){
    let csv='日期,熱量,蛋白,體重,喝水\n';

    for(let d in data){
        let t=getTotal(data[d]);
        csv+=`${d},${t.cal},${t.pro},${data[d].weight||''},${data[d].water||''}\n`;
    }

    let blob=new Blob([csv]);
    let a=document.createElement('a');
    a.href=URL.createObjectURL(blob);
    a.download='diet.csv';
    a.click();
}

// =====================
// 初始化
// =====================
init();
update();
</script>

</body>
</html>
